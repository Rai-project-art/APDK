<script type="module">
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, getDoc, doc, serverTimestamp, updateDoc} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const app = initializeApp(firebaseConfig);
const db = getFirestore(app); 
 const auth = getAuth(app);
    
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";




async function masukkan(){
    const us= document.getElementById("usn").value;
    const ps=document.getElementById("pass").value;
    
    prosesLogin(us,ps);
}


document.getElementById("cobalagi").addEventListener("click", function(){
    document.getElementById("login").style.display="flex";
    document.getElementById("gagallogin").style.display="none";
})

function gagal(){
    document.getElementById("login").style.display="none";
    document.getElementById("gagallogin").style.display="flex";
}

function sukses(){
    document.getElementById("login").style.display="none";
    document.getElementById("sukseslogin").style.display="flex";
}

async function prosesLogin(usn, password) {
    const ss=`${usn}@mantasigap.team`;
    document.getElementById("loading").style.display="flex";
  try {
    const userCredential = await signInWithEmailAndPassword(auth, ss, password);
    const user = userCredential.user;
    
    
    await sukses();
    // Setelah login berhasil, arahkan ke halaman admin
    window.location.replace("beranda.html"); 
    
  } catch (error) {
    // Atur pesan error di sini
    console.error("Login gagal:", error.message);
    gagal();
    
    
  }
  document.getElementById("loading").style.display="none";
}

    
    
    document.getElementById("masuk").addEventListener("click", function(){
        if(document.getElementById("usn").value!=""&&document.getElementById("pass").value!=""){
            masukkan();
            
        }else if(document.getElementById("usn").value===""){
        document.getElementById("erupass").style.display="none";
            document.getElementById("erus").style.display="block";
            document.getElementById("erus").innerHTML="Masukkan Nama Pengguna"
        }else if(document.getElementById("pass").value===""){
           document.getElementById("erus").style.display="none";
           document.getElementById("erupass").style.display="block";
            document.getElementById("erupass").innerHTML="Masukkan Kata Sandi"
        }
            
        
        
    })
</script>
